<!DOCTYPE html>
<html lang="de">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

 <!-- Tailwind CSS CDN -->
 <script src="https://cdn.tailwindcss.com"></script>

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="flex items-center justify-center w-full h-full bg-[#f0f2f5]">
 <!-- WhatsApp / Telegram Desktop & Mobile Vollbild-Simulator -->
 <div class="w-full h-full sm:rounded-none sm:shadow-none sm:border-none bg-[#efeae2] flex flex-col overflow-hidden relative">
  <!-- WhatsApp Header -->
  <div class="bg-[#f0f2f5] px-4 py-3 flex items-center justify-between border-b border-slate-200 select-none flex-shrink-0 z-20">
   <div class="flex items-center space-x-3">
    <div class="relative">
     <img src="https://i.imgur.com/Tw3ULR2.jpeg" alt="Profilbild" class="w-10 h-10 rounded-full object-cover shadow border border-slate-300 flex-shrink-0 protected-media pointer-events-none" oncontextmenu="return false;">
     <div id="bot-status-dot" class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-[#f0f2f5] transition-colors duration-300"></div>
    </div>
    <div>
     <h3 class="text-sm font-semibold text-slate-800 tracking-wide">Valeria</h3>
     <p id="bot-status-text" class="text-[11px] text-slate-500 transition-all duration-300">Online</p>
    </div>
   </div>
   <div class="text-slate-600 space-x-3 sm:space-x-4 text-base">
    <button id="video-btn" class="hover:text-purple-600 transition cursor-pointer" title="Videoanruf"><i class="fa-solid fa-video"></i></button>
    <button id="phone-btn" class="hover:text-purple-600 transition cursor-pointer" title="Anruf"><i class="fa-solid fa-phone"></i></button>
    <button class="hover:text-purple-600 transition"><i class="fa-solid fa-ellipsis-vertical"></i></button>
   </div>
  </div>
  <!-- Pop-up Benachrichtigung (Modal) -->
  <div id="call-modal" class="absolute inset-0 bg-black/40 z-50 flex items-center justify-center p-4 hidden">
   <div class="bg-white border border-slate-200 rounded-2xl p-5 max-w-sm w-full text-center shadow-2xl space-y-4 relative">
    <button id="modal-x-btn" class="absolute top-3 right-3 text-slate-400 hover:text-slate-700 text-lg w-8 h-8 rounded-full flex items-center justify-center transition cursor-pointer">
<i class="fa-solid fa-xmark"></i>
</button>
    <div class="w-14 h-14 bg-[#FCBBF6]/30 text-purple-700 rounded-full flex items-center justify-center mx-auto text-2xl mt-2">
     <i class="fa-solid fa-video" id="modal-icon"></i>
    </div>
    <h4 class="text-slate-800 font-semibold text-base">Anrufhinweis</h4>
    <p id="modal-text" class="text-slate-600 text-xs sm:text-sm leading-relaxed">
     <!-- Der Text wird dynamisch per JavaScript gesetzt -->
    </p>
    <a href="https://clicknlook.site/a/Kr54Ni401WhAzBp" target="_blank" id="close-modal-btn" class="block w-full bg-[#FCBBF6] hover:bg-[#e39ad8] text-slate-900 font-semibold py-2.5 rounded-xl text-sm transition shadow text-center">
Kostenlos registrieren
</a>
   </div>
  </div>
  <!-- Bildbetrachter (Lightbox) -->
  <div id="lightbox-modal" class="absolute inset-0 bg-black/85 z-50 flex items-center justify-center p-3 hidden select-none">
   <button id="close-lightbox" class="absolute top-4 right-4 text-white text-2xl bg-black/50 hover:bg-black/80 w-10 h-10 rounded-full flex items-center justify-center transition cursor-pointer z-20">
<i class="fa-solid fa-xmark"></i>
</button>
   <div class="relative max-w-full max-h-full flex items-center justify-center">
    <div class="lightbox-protection" oncontextmenu="return false;"></div>
    <img id="lightbox-img" src="" alt="Vollbild" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl protected-media pointer-events-none" draggable="false">
   </div>
  </div>
  <!-- Emoji-Auswahl -->
  <div id="emoji-picker-container" class="absolute bottom-16 left-3 right-3 sm:left-4 sm:right-4 bg-white border border-slate-200 rounded-xl p-3 shadow-2xl hidden z-30 max-h-48 overflow-y-auto">
   <div class="text-xs text-slate-500 mb-2 font-semibold">Beliebte Emojis</div>
   <div id="emoji-grid" class="grid grid-cols-8 gap-2 text-xl text-center"></div>
  </div>
  <!-- Chat-Nachrichtenbereich -->
  <div id="chat-messages" class="flex-1 p-4 sm:p-6 overflow-y-auto space-y-3 chat-background text-sm"></div>
  <!-- Verstecktes Dateieingabefeld -->
  <input type="file" id="image-input" accept="image/*" class="hidden">
  <!-- Chat Eingabebereich -->
  <div class="bg-[#f0f2f5] px-3 py-2.5 sm:px-6 sm:py-4 flex items-center space-x-2 sm:space-x-4 flex-shrink-0 border-t border-slate-200 z-20">
   <button id="emoji-btn" class="text-slate-500 hover:text-slate-700 px-1.5 transition text-lg"><i class="fa-regular fa-face-smile"></i></button>
   <button id="attach-btn" class="text-slate-500 hover:text-slate-700 px-1.5 transition text-lg" title="Bild anhängen"><i class="fa-solid fa-paperclip"></i></button>
   <input type="text" id="user-input" placeholder="Gib eine Nachricht ein..." class="flex-1 bg-white text-slate-800 text-xs sm:text-sm px-4 py-2.5 sm:py-3 rounded-lg focus:outline-none border border-slate-200 placeholder-slate-400 shadow-sm">
   <button id="send-btn" class="bg-[#FCBBF6] hover:bg-[#e39ad8] text-slate-900 w-10 h-10 sm:w-11 sm:h-11 rounded-full flex items-center justify-center shadow transition flex-shrink-0 font-bold">
<i class="fa-solid fa-paper-plane text-xs"></i>
</button>
  </div>
 </div>
 <!-- FUNKTIONALES JAVASCRIPT -->
</body>

<style>*, *::before, *::after {
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
        }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }
        .typing span {
            animation-name: blink;
            animation-duration: 1.4s;
            animation-iteration-count: infinite;
            animation-fill-mode: both;
        }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }

        #emoji-picker-container {
            scrollbar-width: thin;
            scrollbar-color: #d1d5db #ffffff;
        }
        #emoji-picker-container::-webkit-scrollbar {
            width: 6px;
        }
        #emoji-picker-container::-webkit-scrollbar-thumb {
            background-color: #d1d5db;
            border-radius: 4px;
        }

        .chat-background {
            position: relative;
            background-color: #130038;
            overflow-y: auto;
        }

        .chat-background::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/Tw3ULR2.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 0;
        }

        .chat-background::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FDE8F6;
            opacity: 0.60;
            pointer-events: none;
            z-index: 0;
        }

        .protected-media {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Unsichtbare Ebene zur Blockierung von Interaktionen im vergrößerten Bild */
        .lightbox-protection {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        /* Klasse für größere Emojis im Chat */
        .chat-emoji-large {
            font-size: 1.5rem;
            line-height: 1.2;
            display: inline-block;
            vertical-align: middle;
        }
</style><script>tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        whatsapp: '#FCBBF6',
                        whatsappDark: '#e39ad8',
                        whatsappLight: '#fce4fa',
                    }
                }
            }
        }

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const botStatusText = document.getElementById('bot-status-text');
        const botStatusDot = document.getElementById('bot-status-dot');
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPickerContainer = document.getElementById('emoji-picker-container');
        const emojiGrid = document.getElementById('emoji-grid');
        const attachBtn = document.getElementById('attach-btn');
        const imageInput = document.getElementById('image-input');
        
        const videoBtn = document.getElementById('video-btn');
        const phoneBtn = document.getElementById('phone-btn');
        const callModal = document.getElementById('call-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const modalXBtn = document.getElementById('modal-x-btn');
        const modalIcon = document.getElementById('modal-icon');
        const modalText = document.getElementById('modal-text');

        const lightboxModal = document.getElementById('lightbox-modal');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeLightbox = document.getElementById('close-lightbox');

        let chatIndex = 0;

        function showCallNotification(type) {
            if (type === 'video') {
                modalIcon.className = "fa-solid fa-video";
                modalText.textContent = "Wenn du einen 20-minütigen Videoanruf möchtest, registriere dich einfach kostenlos auf unserer Website und bestätige dein Konto per E-Mail.";
            } else {
                modalIcon.className = "fa-solid fa-phone";
                modalText.textContent = "Wenn einen 60-minütigen Sexanruf tätigen möchten, registrieren sich einfach kostenlos auf unserer Website und bestätigen Ihr Konto per E-Mail.";
            }
            callModal.classList.remove('hidden');
        }

        videoBtn.addEventListener('click', () => showCallNotification('video'));
        phoneBtn.addEventListener('click', () => showCallNotification('phone'));
        closeModalBtn.addEventListener('click', () => callModal.classList.add('hidden'));
        modalXBtn.addEventListener('click', () => callModal.classList.add('hidden'));
        callModal.addEventListener('click', (e) => {
            if (e.target === callModal) {
                callModal.classList.add('hidden');
            }
        });

        closeLightbox.addEventListener('click', () => {
            lightboxModal.classList.add('hidden');
        });

        lightboxModal.addEventListener('click', (e) => {
            if (e.target === lightboxModal) {
                lightboxModal.classList.add('hidden');
            }
        });

        const emojisList = [
            '😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '😊', '😇',
            '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘', '😗', '😙', '😚',
            '😋', '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭', '🤫', '🤔',
            '👍', '👎', '👌', '🤌', '🤏', '✌️', '🤞', '🫰', '🤟', '🤘',
            '👋', '👏', '🙌', '👐', '🤲', '🤝', '🙏', '✍️', '💪', '🦾',
            '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔',
            '🔥', '⭐', '🌟', '✨', '⚡', '💥', '🎉', '🎊', '🚀', '💡'
        ];

        emojisList.forEach(emoji => {
            const span = document.createElement('span');
            span.textContent = emoji;
            span.className = "cursor-pointer hover:bg-slate-100 p-1.5 rounded transition select-none text-xl";
            span.addEventListener('click', () => {
                userInput.value += emoji;
                userInput.focus();
                emojiPickerContainer.classList.add('hidden');
            });
            emojiGrid.appendChild(span);
        });

        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPickerContainer.classList.toggle('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!emojiPickerContainer.contains(e.target) && !emojiBtn.contains(e.target)) {
                emojiPickerContainer.classList.add('hidden');
            }
        });

        attachBtn.addEventListener('click', () => {
            imageInput.click();
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(uploadEvent) {
                    appendMessage(`<div class="space-y-1"><img src="${uploadEvent.target.result}" class="rounded-lg max-h-48 object-cover w-full cursor-pointer hover:opacity-95 transition zoomable-img pointer-events-auto" draggable="false"></div><div class="text-[10px] text-slate-700 float-right mt-1 ml-2">Bild gesendet 📷</div>`, 'user');
                    imageInput.value = '';
                    handleAutoResponse();
                }
                reader.readAsDataURL(file);
            }
        });

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        // Funktion zum Vergrößern von Emojis in Textnachrichten
        function formatEmojis(text) {
            // Regex zum Erkennen von Emojis
            const emojiRegex = /(\p{Extended_Pictographic}|[\u{1F300}-\u{1F5FF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]+)/gu;
            return text.replace(emojiRegex, '<span class="chat-emoji-large">$1</span>');
        }

        function appendMessage(content, sender) {
            const time = getCurrentTime();
            let messageHTML = '';

            // Wenn es reiner Text ist (kein HTML-Tag am Anfang wie <img oder <div), Emojis formatieren
            let formattedContent = content;
            if (!content.trim().startsWith('<')) {
                formattedContent = formatEmojis(content);
            }

            if (sender === 'user') {
                messageHTML = `
                    <div class="flex justify-end relative z-10">
                        <div class="bg-[#FCBBF6] text-slate-900 p-3 rounded-2xl rounded-tr-none max-w-[85%] sm:max-w-[70%] shadow-sm border border-[#e39ad8]/40">
                            <div class="text-xs sm:text-sm leading-relaxed">${formattedContent}</div>
                        </div>
                    </div>
                `;
            } else {
                messageHTML = `
                    <div class="flex justify-start relative z-10">
                        <div class="bg-white text-slate-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] sm:max-w-[70%] shadow-sm border border-slate-100">
                            <div class="text-xs sm:text-sm leading-relaxed">${formattedContent}</div>
                            <span class="text-[10px] text-slate-400 float-right mt-1 ml-2">${time}</span>
                        </div>
                    </div>
                `;
            }

            chatMessages.insertAdjacentHTML('beforeend', messageHTML);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const chatImages = chatMessages.querySelectorAll('.zoomable-img');
            chatImages.forEach(img => {
                if (!img.dataset.listenerAttached) {
                    img.dataset.listenerAttached = "true";
                    img.addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        lightboxImg.src = img.src;
                        lightboxModal.classList.remove('hidden');
                    });
                }
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                botStatusText.innerHTML = `<span class="typing text-emerald-600 font-medium">Schreibt<span>.</span><span>.</span><span>.</span></span>`;
            }, 300);

            setTimeout(() => {
                botStatusText.textContent = "Online";
                appendMessage("Hallo Baby! Möchtest du jetzt ein heißes Gespräch führen? Ich bin verfügbar, um zu chatten und dir meine geilen Bilder zu schicken.", 'bot');
            }, 2000);
        });

        const botResponses = [
            "Baby, ich bin gerade nackt, soll ich dir ein Bild schicken?",
            "Willst du meine feuchte Muschi sehen?",
            `<div class="space-y-1"><img src="https://i.imgur.com/6xN6oBu.jpeg" alt="Exklusives Foto" class="rounded-lg max-h-56 object-cover w-full border border-slate-200 protected-media zoomable-img cursor-pointer hover:opacity-95 transition pointer-events-auto" oncontextmenu="return false;" draggable="false"></div>`,
            "Kann ich dir noch mehr Bilder schicken?",
            `<div class="space-y-3"><p class="leading-relaxed">Du musst dich nur kostenlos auf unserer Website registrieren und dein Konto über deine E-Mail-Adresse bestätigen. Sobald du registriert bist, schickst du mir einfach einen Screenshot und fertig!</p><a href="https://clicknlook.site/a/Kr54Ni401WhAzBp" target="_blank" class="block w-full text-center bg-[#FCBBF6] text-slate-900 font-semibold px-3 py-2 rounded-xl text-xs sm:text-sm hover:bg-[#e39ad8] transition shadow">👉 Kostenlos registrieren</a></div>`
        ];

        function handleAutoResponse() {
            if (chatIndex >= botResponses.length) {
                return;
            }

            const currentReply = botResponses[chatIndex];
            chatIndex++;

            setTimeout(() => {
                botStatusText.innerHTML = `<span class="typing text-emerald-600 font-medium">Schreibt<span>.</span><span>.</span><span>.</span></span>`;
            }, 300);

            setTimeout(() => {
                botStatusText.textContent = "Online";
                botStatusDot.classList.remove('bg-red-500');
                botStatusDot.classList.add('bg-emerald-500');
                
                appendMessage(currentReply, 'bot');
            }, 2000);
        }

        function processUserMessage() {
            const text = userInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'user');
            userInput.value = '';

            handleAutoResponse();
        }

        sendBtn.addEventListener('click', processUserMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                processUserMessage();
            }
        });</script></html>
